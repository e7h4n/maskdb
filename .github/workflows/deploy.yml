name: deploy

# Push to main → deploy the API worker and the marketing site to Cloudflare.
on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v4

      # Skip cleanly (not a hard failure) until the CF token secret is configured.
      - id: guard
        run: |
          if [ -z "$CLOUDFLARE_API_TOKEN" ]; then
            echo "::warning::CLOUDFLARE_API_TOKEN secret is not set — skipping deploy."
            echo "ready=false" >> "$GITHUB_OUTPUT"
          else
            echo "ready=true" >> "$GITHUB_OUTPUT"
          fi

      - if: steps.guard.outputs.ready == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - if: steps.guard.outputs.ready == 'true'
        run: npm ci

      - if: steps.guard.outputs.ready == 'true'
        run: npm run typecheck

      # Idempotent: wrangler only applies migrations not already recorded.
      - name: Apply D1 migrations
        if: steps.guard.outputs.ready == 'true'
        run: npx wrangler d1 migrations apply maskdb --remote

      # Secrets (MASTER_KEY) are preserved across deploys — wrangler does not touch them.
      - name: Deploy API worker (api.maskdb.ai)
        if: steps.guard.outputs.ready == 'true'
        run: npx wrangler deploy

      - name: Deploy marketing site (www.maskdb.ai)
        if: steps.guard.outputs.ready == 'true'
        run: npx wrangler deploy -c wrangler.site.toml
