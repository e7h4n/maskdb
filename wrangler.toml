name = "maskdb"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# The masking + auth proxy. All control-plane and data-plane routes live here.
# The custom domain below is reconciled on every `wrangler deploy`.
[[routes]]
pattern = "api.maskdb.ai"
custom_domain = true

# --- service metadata DB (Cloudflare D1 / SQLite) -------------------------
# Create with:  wrangler d1 create maskdb
# then paste the returned database_id below.
[[d1_databases]]
binding = "DB"
database_name = "maskdb"
database_id = "5a4f465c-5f2f-453a-b4ae-e05f78f2e482"

[vars]
# Max rows any single /query may return. Hard ceiling, also the default.
MAX_LIMIT = "1000"

# --- secrets (set with: wrangler secret put <NAME>) -----------------------
# MASTER_KEY  : base64-encoded 32-byte (256-bit) key used to AES-GCM encrypt
#               stored connection strings. Generate with:
#               openssl rand -base64 32
